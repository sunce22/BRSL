name: RSL Buddy — Dev Agent

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dev-agent:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Configure git + PATH
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "dev-agent@rslbuddy"
          git config user.name "RSL Dev Agent"
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/sunce22/BRSL.git"
          $env:PATH += ";C:\Program Files\GitHub CLI"
          # Delete all local branches except main — prevents Claude from seeing stale agent branches
          git branch | Where-Object { $_ -notmatch '\*' -and $_ -notmatch 'main' } | ForEach-Object { git branch -D $_.Trim() 2>&1 | Out-Null }
          Write-Host "gh: $(gh --version 2>&1 | Select-Object -First 1)"
          Write-Host "Local branches: $(git branch)"

      - name: Claude implements task
        id: claude_run
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";C:\Program Files\GitHub CLI"

          $prompt = @'
You are a development agent for RSL Buddy — a Twitch Extension and OBS Browser Source overlay for Raid: Shadow Legends streamers. Your job is to implement ONE task from TODO.md and commit the changes to a new branch.

## Working directory
Current directory is the repo root. Run all git/gh commands from here.

## Project structure
- panel/     — Twitch Extension Panel (panel.html, panel.js, panel.css)
- obs/       — OBS overlay (obs.html, obs.js, obs.css; obs-guest.* for guest mode)
- shared/    — Shared modules: hero-card.js, effects-list.js, effect-descriptions.js, i18n.js, data.js, styles.css, utils.js, feedback.js
- extension/ — manifest.json
- tests/     — node --test tests/*.test.js

## Tech stack
Vanilla JS ES modules, no bundler, no external libraries, CSS custom properties.

## Steps — execute each one IN ORDER:
1. Run: Get-Content TODO.md | Out-String
2. Run: gh pr list --state open --limit 20 (to see what's already in progress — skip tasks that already have a PR)
3. Find ONE task: not done ([x]), tagged with globe emoji (UI/source code), NOT data/translations/external
4. Implement the code change in the relevant files
5. Run: node --test tests/*.test.js — ALL must pass
6. Run: git checkout -b agent/TODAYS-DATE-SHORT-DESCRIPTION (use format agent/2026-06-02-description)
7. Run: git add -A
8. Run: git commit -m "feat: description"
9. Run: git push origin HEAD
10. Run: gh pr create --title "short title" --body "What changed. Closes: TASK_NAME"

## Rules
- A task is "done" only if there is an OPEN or MERGED PR for it on GitHub — local branches do NOT count
- If no suitable task: Run gh issue create --title "No tasks $(Get-Date -Format yyyy-MM-dd)" --body "All globe-tagged tasks are done or have open PRs."
- NEVER commit to main
- Do NOT touch: data/heroes.json, i18n/heroes-uk.json, tools/*.py, tools/*.mjs
'@

          Write-Host "=== Starting Claude ==="
          claude -p $prompt --dangerously-skip-permissions
          Write-Host "=== Claude done. Exit code: $LASTEXITCODE ==="
          Write-Host "=== Git status after ==="
          git status
          Write-Host "=== Remote branches ==="
          git branch -r

      - name: Check result
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";C:\Program Files\GitHub CLI"
          Write-Host "=== Open PRs ==="
          gh pr list --repo sunce22/BRSL 2>&1
          Write-Host "=== Open Issues ==="
          gh issue list --repo sunce22/BRSL --limit 5 2>&1

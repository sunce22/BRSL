name: RSL Buddy — Dev Agent

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dev-agent:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Diagnostics
        shell: powershell
        run: |
          Write-Host "=== ENV ==="
          Write-Host "PWD: $(Get-Location)"
          Write-Host "TODO exists: $(Test-Path TODO.md)"
          Write-Host "claude: $(where.exe claude 2>&1)"
          Write-Host "gh: $(where.exe gh 2>&1)"
          Write-Host "node: $(node --version)"
          if (Test-Path TODO.md) { Write-Host "TODO first 10 lines:"; Get-Content TODO.md | Select-Object -First 10 }

      - name: Configure git
        shell: powershell
        run: |
          git config user.email "dev-agent@rslbuddy"
          git config user.name "RSL Dev Agent"

      - name: Run Dev Agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $prompt = @'
          You are a development agent for RSL Buddy — a Twitch Extension and OBS Browser Source overlay for Raid: Shadow Legends streamers.

          ## Working directory
          You are in the checked-out repository root.

          ## Project structure
          - panel/     — Twitch Extension Panel (panel.html, panel.js, panel.css)
          - obs/       — OBS overlay (obs.html, obs.js, obs.css; obs-guest.* for guest/viewer mode)
          - shared/    — Shared modules: hero-card.js, effects-list.js, effect-descriptions.js, i18n.js, data.js, styles.css, utils.js, feedback.js
          - extension/ — manifest.json
          - data/      — heroes.json (407 heroes with skills and portrait URLs), skill-multipliers.json
          - i18n/      — heroes-uk.json (Ukrainian hero+skill translations), ui-uk.json (Ukrainian UI strings)
          - tests/     — Unit tests (node --test tests/*.test.js)

          ## Tech stack
          Vanilla JS ES modules, no bundler, no external JS libraries, CSS custom properties for theming.

          ## Your task
          1. Read TODO.md
          2. Find tasks matching ALL criteria:
             - Not done (no [x] checkbox)
             - Tagged with the globe emoji (UI/source code)
             - NOT about: data extraction, content scraping, translations pipeline, external services, memory reading
             - Concrete — clear requirements, no architectural decisions needed
          3. Pick ONE task — prefer simplest and most self-contained
          4. Implement the change in the relevant files
          5. Run: node --test tests/*.test.js — ALL must pass before proceeding
          6. Create a feature branch using today's date: git checkout -b agent/YYYY-MM-DD-short-description
          7. Commit: git add -A then git commit -m "feat: description"
          8. Push: git push origin HEAD
          9. Create PR: gh pr create --title "short title" --body "What changed and why. Closes TODO item: [task name]"

          ## Rules
          - PRs only — never commit directly to main
          - ONE task per run — focused and minimal changes
          - If task is too large or ambiguous — skip it and pick a simpler one
          - Do NOT modify: data/heroes.json, i18n/heroes-uk.json, tools/, any .py or .mjs extraction scripts
          - Code style: no code comments, escapeHtml() on all innerHTML values, no new npm dependencies
          - If no suitable task found: gh issue create --title "Dev Agent: no suitable tasks YYYY-MM-DD" --body "Checked TODO.md. All tasks are either done, too complex, or content-related."
          '@

          claude -p $prompt --dangerously-skip-permissions

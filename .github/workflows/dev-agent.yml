name: RSL Buddy — Dev Agent

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dev-agent:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Configure git + PATH
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "dev-agent@rslbuddy"
          git config user.name "RSL Dev Agent"
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/sunce22/BRSL.git"
          $env:PATH += ";C:\Program Files\GitHub CLI"
          git branch | Where-Object { $_ -notmatch '\*' -and $_ -notmatch 'main' } | ForEach-Object { git branch -D $_.Trim() 2>&1 | Out-Null }
          Write-Host "gh: $(gh --version 2>&1 | Select-Object -First 1)"
          Write-Host "Local branches: $(git branch)"

      - name: Claude implements task
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";C:\Program Files\GitHub CLI"
          $prompt = Get-Content ".github/dev-agent-prompt.txt" -Raw
          Write-Host "=== Starting Claude ==="
          claude -p $prompt --dangerously-skip-permissions
          Write-Host "=== Claude done. Exit: $LASTEXITCODE ==="
          git status
          git branch -r

      - name: Create PR if branch was pushed
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";C:\Program Files\GitHub CLI"
          # Find any agent/ branch that is not main
          $branch = git branch -r | Where-Object { $_ -match 'origin/agent/' } | Select-Object -First 1
          if ($branch) {
            $branch = $branch.Trim().Replace('origin/', '')
            Write-Host "Found agent branch: $branch"
            # Check if PR already exists
            $existing = gh pr list --repo sunce22/BRSL --head $branch --json number --jq '.[0].number' 2>&1
            if (-not $existing -or $existing -eq 'null') {
              Write-Host "Creating PR for $branch"
              gh pr create --repo sunce22/BRSL --base main --head $branch `
                --title "Agent: $($branch -replace 'agent/\d{4}-\d{2}-\d{2}-','')" `
                --body "Automated implementation by dev agent. Branch: $branch"
            } else {
              Write-Host "PR already exists: #$existing"
            }
          } else {
            Write-Host "No agent branch found — Claude may have created an issue instead"
            gh issue list --repo sunce22/BRSL --limit 3 2>&1
          }

name: RSL Buddy — Dev Agent

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  dev-agent:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Configure git + PATH
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "dev-agent@rslbuddy"
          git config user.name "RSL Dev Agent"
          git remote set-url origin "https://x-access-token:$env:GITHUB_TOKEN@github.com/sunce22/BRSL.git"
          $env:PATH += ";C:\Program Files\GitHub CLI"
          git branch | Where-Object { $_ -notmatch '\*' -and $_ -notmatch 'main' } | ForEach-Object { git branch -D $_.Trim() 2>&1 | Out-Null }
          Write-Host "gh: $(gh --version 2>&1 | Select-Object -First 1)"
          Write-Host "Local branches: $(git branch)"

      - name: Claude implements task
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";C:\Program Files\GitHub CLI"
          $prompt = Get-Content ".github/dev-agent-prompt.txt" -Raw
          Write-Host "=== Starting Claude ==="
          claude -p $prompt --dangerously-skip-permissions
          Write-Host "=== Claude done. Exit: $LASTEXITCODE ==="
          git status
          git branch -r

      - name: Check result
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $env:PATH += ";C:\Program Files\GitHub CLI"
          Write-Host "=== Open PRs ==="
          gh pr list --repo sunce22/BRSL 2>&1
          Write-Host "=== Open Issues (last 5) ==="
          gh issue list --repo sunce22/BRSL --limit 5 2>&1
